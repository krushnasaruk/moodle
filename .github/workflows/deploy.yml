name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Prepare Standalone Build
        run: |
          mkdir -p deployment/next-app
          cp -a .next/standalone/. deployment/next-app/
          cp -r public deployment/next-app/public
          mkdir -p deployment/next-app/.next
          cp -r .next/static deployment/next-app/.next/static
          
          # Create root server.js for cPanel Passenger
          cat << 'EOF' > deployment/server.js
          const path = require('path');
          process.chdir(path.join(__dirname, 'next-app'));
          require('./next-app/server.js');
          EOF
          
          mkdir -p deployment/tmp
          touch deployment/tmp/restart.txt

      - name: FTP Sync to Server
        env:
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "set ssl:verify-certificate no; set ftp:passive-mode true; open -u '${{ secrets.FTP_USERNAME }}','$LFTP_PASSWORD' ftp://${{ secrets.FTP_SERVER }}; mirror -R -v ./deployment/ ./; quit"
